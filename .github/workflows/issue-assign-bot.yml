name: Issue Assignment & Management Bot

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Just type the issue number to fix (e.g., 10)'
        required: true
        type: string

jobs:
  handle-assignment:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Process Issue Assignment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            
            // 1. Get the issue number dynamically
            let issue_number = context.payload.issue?.number;
            
            if (context.eventName === 'workflow_dispatch') {
              const inputNum = '${{ inputs.issue_number }}'.trim();
              if (inputNum) {
                issue_number = parseInt(inputNum, 10);
              }
            }

            if (!issue_number || isNaN(issue_number)) {
              core.setFailed("Please provide a valid issue number.");
              return;
            }

            try {
              // 2. Fetch the target issue data
              const { data: issue } = await github.rest.issues.get({
                owner,
                repo,
                issue_number
              });

              // If it's already assigned, don't overwrite it
              if (issue.assignees && issue.assignees.length > 0) {
                console.log(`Issue #${issue_number} is already assigned to @${issue.assignees[0].login}. Skipping.`);
                return;
              }

              // 3. Find the creator (this works perfectly for new AND old issues!)
              const issueCreator = issue.user.login;

              // 4. Assign the creator automatically
              await github.rest.issues.addAssignees({
                owner,
                repo,
                issue_number,
                assignees: [issueCreator]
              });

              // 5. Post a simple welcome message
              let reasonMessage = `👋 @${issueCreator}, you have been automatically assigned to this issue as the creator. Good luck! 🚀`;
              
              if (context.eventName === 'issue_comment') {
                const commenter = context.payload.comment.user.login;
                // If an issue is unassigned and someone comments, assign the original creator instead
                reasonMessage = `✅ @${issueCreator} (the issue creator) has been assigned. @${commenter}, thanks for looking into this!`;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: reasonMessage
              });

              console.log(`Successfully assigned creator @${issueCreator} to Issue #${issue_number}`);

            } catch (error) {
              core.setFailed(`Failed to assign issue: ${error.message}`);
            }