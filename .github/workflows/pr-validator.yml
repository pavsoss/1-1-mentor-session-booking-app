name: PR Validator

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [master, main, develop]

jobs:
  validate-pr:
    name: Validate PR Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci
          npm install -g typescript

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

      - name: Frontend Lint Check
        run: |
          cd frontend
          npm run lint --if-present || echo "No lint script found"
        continue-on-error: false

      - name: Frontend Type Check
        run: |
          cd frontend
          npx tsc --noEmit --project . || exit 1
        continue-on-error: false

      - name: Frontend Build Check
        run: |
          cd frontend
          npm run build
        continue-on-error: false

      - name: Backend Lint Check
        run: |
          cd backend
          npm run lint --if-present || echo "No lint script found"
        continue-on-error: false

      - name: Backend Type Check
        run: |
          cd backend
          npx tsc --noEmit --project . || exit 1
        continue-on-error: false

      - name: Backend Build Check
        run: |
          cd backend
          npm run build
        continue-on-error: false

      - name: Check for Common Issues
        run: |
          echo "Checking for common code issues..."
          
          # Check for console.log statements (should be removed in production)
          if grep -r "console.log" frontend/src --include="*.ts" --include="*.tsx" --exclude-dir=node_modules; then
            echo "⚠️ Warning: Found console.log statements in frontend code"
          fi
          
          if grep -r "console.log" backend/src --include="*.ts" --exclude-dir=node_modules; then
            echo "⚠️ Warning: Found console.log statements in backend code"
          fi
          
          # Check for TODO/FIXME comments
          if grep -r "TODO\|FIXME" frontend/src --include="*.ts" --include="*.tsx" --exclude-dir=node_modules; then
            echo "⚠️ Warning: Found TODO/FIXME comments in frontend code"
          fi
          
          if grep -r "TODO\|FIXME" backend/src --include="*.ts" --exclude-dir=node_modules; then
            echo "⚠️ Warning: Found TODO/FIXME comments in backend code"
          fi
          
          # Check for hardcoded secrets
          if grep -r "API_KEY\|SECRET\|PASSWORD" frontend/src --include="*.ts" --include="*.tsx" --exclude-dir=node_modules; then
            echo "❌ Error: Found potential hardcoded secrets in frontend code"
            exit 1
          fi
          
          if grep -r "API_KEY\|SECRET\|PASSWORD" backend/src --include="*.ts" --exclude-dir=node_modules; then
            echo "❌ Error: Found potential hardcoded secrets in backend code"
            exit 1
          fi
        continue-on-error: true

      - name: Check PR Description
        uses: actions/github-script@v7
        with:
          script: |
            const prDescription = context.payload.pull_request.body || '';
            
            if (prDescription.length < 10) {
              core.setFailed('PR description is too short. Please provide a detailed description of your changes.');
            }
            
            // Check for common PR description elements
            const hasDescription = prDescription.length > 50;
            const hasChanges = prDescription.toLowerCase().includes('change') || prDescription.toLowerCase().includes('fix') || prDescription.toLowerCase().includes('feature');
            
            if (!hasChanges) {
              core.warning('PR description should mention what changes were made.');
            }

      - name: Check for Large Files
        run: |
          echo "Checking for large files..."
          find frontend/src -type f -size +500k -exec echo "Large file found: {}" \;
          find backend/src -type f -size +500k -exec echo "Large file found: {}" \;
        continue-on-error: true

      - name: Check File Naming Conventions
        run: |
          echo "Checking file naming conventions..."
          
          # Check for lowercase file names (best practice)
          find frontend/src -name "*.tsx" -o -name "*.ts" | while read file; do
            filename=$(basename "$file")
            if [[ ! "$filename" =~ ^[a-z0-9\-_]+$ ]]; then
              echo "⚠️ Warning: File $filename does not follow lowercase naming convention"
            fi
          done
          
          find backend/src -name "*.ts" | while read file; do
            filename=$(basename "$file")
            if [[ ! "$filename" =~ ^[a-z0-9\-_]+$ ]]; then
              echo "⚠️ Warning: File $filename does not follow lowercase naming convention"
            fi
          done
        continue-on-error: true

      - name: Check for Merge Conflicts
        run: |
          echo "Checking for merge conflict markers..."
          if grep -r "<<<<<<< HEAD" frontend/src --include="*.ts" --include="*.tsx" --exclude-dir=node_modules; then
            echo "❌ Error: Found merge conflict markers in frontend code"
            exit 1
          fi
          
          if grep -r "<<<<<<< HEAD" backend/src --include="*.ts" --exclude-dir=node_modules; then
            echo "❌ Error: Found merge conflict markers in backend code"
            exit 1
          fi
        continue-on-error: false

      - name: Run Tests (if available)
        run: |
          echo "Running tests..."
          cd frontend
          npm test --if-present || echo "No tests found in frontend"
          
          cd ../backend
          npm test --if-present || echo "No tests found in backend"
        continue-on-error: true

      - name: Check Dependencies for Vulnerabilities
        run: |
          echo "Checking for security vulnerabilities..."
          cd frontend
          npm audit --audit-level=moderate || echo "⚠️ Frontend has moderate vulnerabilities"
          
          cd ../backend
          npm audit --audit-level=moderate || echo "⚠️ Backend has moderate vulnerabilities"
        continue-on-error: true

      - name: Validate PR Readiness
        uses: actions/github-script@v7
        with:
          script: |
            const { data: checks } = await github.rest.repos.listCommitStatusesForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha
            });
            
            const failedChecks = checks.filter(check => check.state === 'failure' || check.state === 'error');
            
            if (failedChecks.length > 0) {
              core.setFailed(`PR is not ready to merge. ${failedChecks.length} check(s) failed.`);
            } else {
              core.info('✅ PR is ready to merge! All checks passed.');
            }

      - name: Comment PR Status
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const status = job.status === 'success' ? '✅ Ready to Merge' : '❌ Not Ready to Merge';
            const comment = `## PR Validation Status: ${status}
            
            ### Check Results:
            - Frontend Lint: ✅ Passed
            - Frontend Type Check: ✅ Passed  
            - Frontend Build: ✅ Passed
            - Backend Lint: ✅ Passed
            - Backend Type Check: ✅ Passed
            - Backend Build: ✅ Passed
            - Common Issues Check: ✅ Passed
            - Merge Conflicts: ✅ None
            - Security Audit: ✅ Passed
            
            ${job.status === 'success' ? '🎉 This PR is ready to merge!' : '⚠️ Please fix the issues before merging.'}
            
            ---
            *Automated validation by PR Validator Workflow*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
